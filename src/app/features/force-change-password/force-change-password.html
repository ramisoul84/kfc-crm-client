<div class="change-password-container">
    <div class="background">
        <div class="bg-overlay"></div>
        <div class="bg-pattern"></div>
    </div>

    <div class="card">
        <div class="header">
            <div class="icon-wrapper">
                <span class="material-icons">lock_reset</span>
            </div>
            <h1>Change Your Password</h1>
            <p class="subtitle">You must change your password before continuing. Please choose a new password.</p>
        </div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form">
            <div class="form-group">
                <label for="old_password" class="form-label">Current Password</label>
                <div class="input-wrapper">
                    <input id="old_password" [type]="showOldPassword ? 'text' : 'password'"
                        formControlName="old_password" class="form-control" placeholder="Enter your current password" />
                    <button type="button" class="toggle-btn" (click)="toggleOldPassword()">
                        <span class="material-icons">{{ showOldPassword ? 'visibility_off' : 'visibility' }}</span>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="new_password" class="form-label">New Password</label>
                <div class="input-wrapper">
                    <input id="new_password" [type]="showNewPassword ? 'text' : 'password'"
                        formControlName="new_password" class="form-control" placeholder="Enter your new password" />
                    <button type="button" class="toggle-btn" (click)="toggleNewPassword()">
                        <span class="material-icons">{{ showNewPassword ? 'visibility_off' : 'visibility' }}</span>
                    </button>
                </div>
                @if (form.get('new_password')?.touched && form.get('new_password')?.hasError('minlength')) {
                <div class="error-message">Password must be at least 6 characters</div>
                }
            </div>

            <button type="submit" class="btn-submit" [disabled]="form.invalid || isLoading">
                @if (!isLoading) {
                <span>Change Password</span>
                } @else {
                <span class="spinner"></span>
                }
            </button>
        </form>
    </div>
</div>

<app-toast-container></app-toast-container>
